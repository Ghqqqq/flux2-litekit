model:
  pretrained_path: black-forest-labs/FLUX.2-klein-base-9B
  dtype: bfloat16
  transformer_override_path: ""

adapter:
  path: ./outputs/t2i_run/final/lora_weights

lora:
  rank: 64
  alpha: 64
  target_modules:
    - to_q

inference:
  prompts:
    - "A product-style image with clean materials and a balanced studio background."
    - "A stylized scene with clear silhouettes and minimal visual clutter."
  output_dir: ./outputs/t2i_inference
  num_inference_steps: 30
  guidance_scale: 4.0
  seeds: [42, 43]
  height: 512
  width: 512
