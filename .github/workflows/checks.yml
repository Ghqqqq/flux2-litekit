name: Checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Python syntax check
        run: python -m py_compile flux2_litekit/*.py

      - name: Shell syntax check
        run: bash -n scripts/*.sh
